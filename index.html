<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cehpoint — Offer Letter Generator</title>
  <meta name="description" content="Generate professional offer letters instantly. Free, no signup required." />
  <meta property="og:title" content="Cehpoint Offer Letter Generator" />
  <meta property="og:description" content="Create polished, ready-to-send job offer letters in minutes." />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#2563eb" />
  <script src="https://cdn.tailwindcss.com">
  </script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            serif: ['Merriweather', 'Georgia', 'serif'],
          },
          animation: {
            'gradient': 'gradient 8s ease infinite',
            'fade-up': 'fadeUp 0.6s ease-out',
            'fade-in': 'fadeIn 0.4s ease-out',
            'slide-up': 'slideUp 0.3s ease-out',
          },
          keyframes: {
            gradient: {
              '0%, 100%': { backgroundPosition: '0% 50%' },
              '50%': { backgroundPosition: '100% 50%' },
            },
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Merriweather:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dist/styles.css" />
</head>
<body class="antialiased">
  <div id="root"></div>
  <script type="module" src="dist/main.js"></script>
</body>
</html>
